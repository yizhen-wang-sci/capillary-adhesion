# Rough over rough surface configuration (hydrophilic)
# Self-affine rough surfaces with contact angle < 90 degrees

[domain]
[domain.grid]
pixel_size = 0.01
nb_pixels = 1024

[problem]
[problem.upper]
shape = "rough"
prefactor = 1e5
rolloff_wavelength_pixels = 64
cutoff_wavelength_pixels = 8
hurst_exponent = 0.95
seed = 0

[problem.lower]
shape = "rough"
prefactor = 1e5
rolloff_wavelength_pixels = 64
cutoff_wavelength_pixels = 8
hurst_exponent = 0.95
seed = 1

[problem.capillary]
interface_thickness = 0.01
contact_angle_degree = 120.0

[solver]
[solver.optimizer]
max_nb_iters = 1000
max_nb_loops = 50
tol_convergence = 1e-6
tol_constraints = 1e-8
init_penalty_weight = 0.1

[simulation]
[simulation.trajectory]
type = "approach_retract"
min_separation = 0.0001
max_separation = 0.0002
# min_separation = 0.0005
# max_separation = 0.00052
step_size = 0.00001
round_trip = true

[simulation.constraint]
pressure = -5000
