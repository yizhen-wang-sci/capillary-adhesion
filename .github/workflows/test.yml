name: test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        nb-proc: [1, 2, 4]

    steps:
    - name: Git checkout
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install requirements
      run: |
        sudo apt-get install -y openmpi-bin libopenmpi-dev libfftw3-dev libfftw3-mpi-dev
        python -m pip install --upgrade pip
        pip install .[test]
        pip list

    - name: Install non binary dependencies
      run: |
        pip install --no-binary=mpi4py mpi4py
        pip install --no-binary=NuMPI NuMPI
        pip install --no-binary=muGrid muGrid

    - name: Test in parallel with ${{ matrix.nb-proc }} processes
      run: |
        mpiexec -np ${{ matrix.nb-proc }} pytest
